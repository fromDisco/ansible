---
- name: Create user with Ansible galaxy role
  hosts: all
  become: true
  vars_files: 
    - vault.yml
    
  roles:
    - role: robertdebock.users
      users_groups: 
        - name: ansible-galaxy
      users: 
        - name: ansible-galaxy
          groups: 
            - sudo
            - ansible-galaxy
          password: "{{ '1234' | password_hash('sha512') }}"
          ssh_key: /home/michel/.ssh/id_ed25519