--- 
- name: create tomcat directory
  file: 
    path: /opt/tomcat/
    state: directory
    mode: 0755
    owner: tomcat
    group: tomcat

- name: create /var/log/tomcat directory
  file: 
    path: /var/log/tomcat/
    state: directory
    mode: 0755
    owner: tomcat
    group: tomcat

- name: Download tomcat
  ansible.builtin.get_url: 
    url: https://dlcdn.apache.org/tomcat/tomcat-11/v11.0.18/bin/apache-tomcat-11.0.18.tar.gz 
    dest: /opt/tomcat/
    mode: 0755
    owner: tomcat
    group: tomcat

- name: Unpack tar.gz file
  ansible.builtin.unarchive:
    src: /opt/tomcat/apache-tomcat-11.0.18.tar.gz
    remote_src: yes
    dest: /opt/tomcat/
    owner: tomcat
    group: tomcat
    mode: 0755

- name: Configure logging.properties file
  ansible.builtin.replace:
    path: /opt/tomcat/apache-tomcat-11.0.18/conf/logging.properties
    regexp: '(^.*\.juli\.AsyncFileHandler\.directory\s*=\s*)\$\{catalina\.base\}\/logs'
    replace: '\1/var/log/tomcat'   # Desired line
    backup: yes                     # Create a backup (e.g., postgresql.conf.12345.bak)

- name: Create systemd service file for Tomcat
  ansible.builtin.copy:
    dest: /etc/systemd/system/tomcat.service
    content: |
      [Unit]
      Description=Apache Tomcat
      After=network.target

      [Service]
      Type=forking
      User=tomcat
      Group=tomcat
      ExecStart=/opt/tomcat/apache-tomcat-11.0.18/bin/startup.sh
      ExecStop=/opt/tomcat/apache-tomcat-11.0.18/bin/shutdown.sh
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Start and enable Tomcat service
  ansible.builtin.systemd:
    name: tomcat
    state: started
    enabled: yes       # startet Tomcat auch nach einem Reboot automatisch