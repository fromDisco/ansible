---
- name: Install Apache as a Service and open Firewall port
  hosts: all
  vars_files: 
    - vault.yml
  become: true

  tasks:
    - name: Install Apache
      ansible.builtin.apt:
        name: apache2
        state: present

    - name: Start apache as a Service
      service: 
        name: apache2
        state: started

    - name: Open Port 80 in Firewall
      community.general.ufw: 
        rule: allow
        port: 80
        proto: tcp

    - name: Restart firewall
      ansible.builtin.command: ufw reload
