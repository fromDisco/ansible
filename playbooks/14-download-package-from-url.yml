---
- name: Download packages from URL
  hosts: all
  vars_files: 
    - vault.yml
  become: true

  tasks:
    - name: Create tomcat user
      ansible.builtin.user:
        name: tomcat
        shell: /bin/sh
        create_home: no
        state: present

    - name: Create tomcat group
      ansible.builtin.group: 
        name: tomcat
        state: present

    - name: create tomcat directory
      file: 
        path: /opt/tomcat/
        state: directory
        mode: 0755
        owner: tomcat
        group: tomcat

    - name: Download tomcat
      ansible.builtin.get_url: 
        url: https://dlcdn.apache.org/tomcat/tomcat-11/v11.0.18/bin/apache-tomcat-11.0.18.tar.gz 
        dest: /opt/tomcat/
        mode: 0755
        owner: tomcat
        group: tomcat
